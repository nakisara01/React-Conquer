<!doctype html>
<html>
  <body>
    <div id="root"></div>
  </body>
  <script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <script type="text/babel">
    function MinutesToHours() {
      const [amounts, setAmounts] = React.useState(0);
      const [inverted, setInverted] = React.useState(false);
      const onChange = (event) => {
        setAmounts(event.target.value);
      };
      const reset = () => setAmounts(0);
      const onFlip = () => {
        reset();
        setInverted((current) => !current);
      };

      return (
        <div>
          <div>
            <label htmlFor="minutes">Minutes</label>
            <input
              value={inverted ? amounts * 60 : amounts}
              id="minutes"
              placerholder="Minutes"
              type="number"
              onChange={onChange}
              disabled={inverted}
            />
          </div>

          <div>
            <label htmlFor="hours">Hours</label>
            <input
              value={inverted ? amounts : Math.round(amounts / 60)}
              id="hours"
              placerholder="Hours"
              type="number"
              disabled={!inverted}
              onChange={onChange}
            />
          </div>
          <button onClick={reset}>Reset</button>
          <button onClick={onFlip}>{inverted ? "Turn back" : "Invert"}</button>
        </div>
      );
    }

    function KmToMiles() {
      const [amount, setAmount] = React.useState(0);
      const [inverted, setInverted] = React.useState(0);

      const onChange = (event) => {
        setAmount(event.target.value);
      };
      const onInvert = () => {
        reset();
        setInverted((current) => !current);
      };
      const reset = () => setAmount(0);

      return (
        <div>
          <div>
            <label htmlFor="Km">KiloMeter</label>
            <input
              value={inverted ? Math.round(amount * 1.6) : amount}
              id="km"
              placerholder="Km"
              type="number"
              onChange={onChange}
              disabled = {inverted}
            />
          </div>

          <div>
            <label htmlFor="Miles">Miles</label>
            <input
              value={inverted ? amount : Math.round(amount / 1.6)}
              id="miles"
              placerholder="Miles"
              type="number"
              onChange={onChange}
              disabled = {!inverted}
            />
          </div>

          <button onClick={reset}>reset</button>
          <button onClick={onInvert}>{inverted ? "Turn back" : "Invert"}</button>
        </div>
      );
    }

    function App() {
      const [index, setIndex] = React.useState("xx");
      const onSelect = (event) => {
        setIndex(event.target.value);
      };
      console.log("render w/", index);
      return (
        <div>
          <h1> Super Converter </h1>
          <select value={index} onChange={onSelect}>
            <option value="xx"> Select your units</option>
            <option value="0"> Minutes & Hours</option>
            <option value="1"> Km & Miles</option>
          </select>
          <hr />
          {index === "xx" ? "Please select your units" : null}
          {index === "0" ? <MinutesToHours /> : null}
          {index === "1" ? <KmToMiles /> : null}
        </div>
      );
    }

    const root = document.getElementById("root");
    ReactDOM.render(<App />, root);
  </script>
</html>
